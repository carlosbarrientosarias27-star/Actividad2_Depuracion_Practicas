name: CI - Sistema Pedidos

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repo al servidor de GitHub
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Python (Cambiado a 3.12 para estabilidad)
      - name: Configurar entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Linter (Solo para la carpeta del sistema)
      - name: Ejecutar linter (flake8)
        run: flake8 Sistema_Pedidos/ --max-line-length=88 --ignore=E302,E241,W292

      # 5. Tests y Cobertura (Todo en un paso)
      - name: Ejecutar tests y medir cobertura
        run: |
          pytest --cov=. --cov-report=xml tests/

      # 6. Seguridad (Analiza solo el código Python)
      - name: Análisis de seguridad (bandit)
        run: bandit -r . -ll -x ./tests