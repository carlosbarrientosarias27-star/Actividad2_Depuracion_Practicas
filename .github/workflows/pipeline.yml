name: CI - Sistema Pedidos

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repo al servidor de GitHub
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Python (Cambiado a 3.12 para estabilidad)
      - name: Configurar entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Linter (Solo para la carpeta del sistema)
      - name: Ejecutar linter (flake8)
        run: flake8 Sistema_Pedidos/ --max-line-length=88 --ignore=E302,E241,W292

      # 5. Tests unitarios y Cobertura
      - name: Ejecutar tests y medir cobertura
        run: |
          # Añadimos la carpeta actual al PATH de Python para que encuentre 'productos.py'
          export PYTHONPATH=$PYTHONPATH:$(pwd)/Sistema_Pedidos
          pytest --cov=Sistema_Pedidos --cov-report=xml Sistema_Pedidos/tests/

      # 7. Seguridad (Solo carpeta Sistema_Pedidos)
      - name: Análisis de seguridad (bandit)
        run: |
          bandit -r Sistema_Pedidos/ -ll -x Sistema_Pedidos/tests/